name: Release tag

# trippie-shared is consumed as a versioned GitHub dependency
# (github:NextWebApps/trippie-shared#vX.Y.Z). Releasing = pushing a git tag
# that matches the package.json "version". This automates that: when a push to
# main changes package.json, if a tag v<version> doesn't already exist, create
# and push it. Consumers then bump to the new tag via their `bump-shared` helper.
#
# Workflow: bump "version" in package.json on main → tag v<version> appears
# automatically → repin api/web to it.

on:
  push:
    branches: [main]
    paths:
      - package.json

permissions:
  contents: write # needed to push the tag

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full history/tags to check existence

      - name: Read version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Create tag if missing
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — nothing to do."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Created and pushed $TAG"
